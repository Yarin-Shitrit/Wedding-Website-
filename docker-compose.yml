services:
  db:
    image: postgres:16-alpine
    container_name: wedding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding
    ports:
      - "5432:5432"
    volumes:
      - wedding-db-data:/var/lib/postgresql/data

volumes:
  wedding-db-data:
